<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy Details — EliteForge</title>
    <meta name="description" content="View detailed information about an academy including ratings, reviews, photos, and map location.">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts — Inter -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <!-- Academy Finder Styles -->
    <link rel="stylesheet" href="academy_finder.css">
</head>

<body class="af-page">

    <!-- ═══════ Navbar ═══════ -->
    <nav class="navbar bg-dark p-3 d-flex align-items-center">
        <div class="d-flex align-items-center">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTNHg88XvMz7N2DCZPR0u_U_sBAce28iWopCA&s"
                 alt="logo" style="height:40px;width:40px;border-radius:50%;">
            <span class="ms-2 text-white fw-bold fs-4">EliteForge</span>
        </div>

        <div class="dropdown">
            <button class="btn dropdown-toggle text-white" data-bs-toggle="dropdown"
                    style="background:none;border:none;">
                <i class="fas fa-user-circle fa-2xl"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="index.html"><i class="fas fa-home me-2"></i>Home</a></li>
                <li><a class="dropdown-item" href="profile.html"><i class="fa-solid fa-user me-2"></i>Profile</a></li>
                <li><a class="dropdown-item" href="dashboard.html"><i class="fa-solid fa-chart-line me-2"></i>Dashboard</a></li>
                <li><a class="dropdown-item" href="academy_finder.html"><i class="fa-solid fa-graduation-cap me-2"></i>Academies</a></li>
                <li><a class="dropdown-item" href="competition_tracker.html"><i class="fa-solid fa-trophy me-2"></i>Competitions</a></li>
                <li><a class="dropdown-item" href="team_finder.html"><i class="fa-solid fa-users me-2"></i>Team Finder</a></li>
                <li><a class="dropdown-item" href="deadline.html"><i class="fa-solid fa-clock me-2"></i>Deadline Alert</a></li>
                <li><a class="dropdown-item" href="help_feedback.html"><i class="fa-solid fa-circle-question me-2"></i>Help & Feedback</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="landing_page.html"><i class="fa-solid fa-right-from-bracket me-2"></i>Logout</a></li>
            </ul>
        </div>
    </nav>

    <!-- ═══════ Hero / Header ═══════ -->
    <section class="af-detail-hero" id="detailHero">
        <div class="container">
            <a href="academy_finder.html" class="af-back-btn mb-3">
                <i class="fa-solid fa-arrow-left"></i> Back to Finder
            </a>
            <h1 class="af-detail-name" id="academyName">Loading...</h1>
            <div class="af-detail-meta" id="detailMeta"></div>
        </div>
    </section>

    <!-- ═══════ Loading ═══════ -->
    <div class="af-spinner" id="loadingSpinner">
        <div class="spinner-ring"></div>
        <p>Fetching academy details...</p>
    </div>

    <!-- ═══════ Content (hidden until loaded) ═══════ -->
    <div id="detailContent" style="display:none;">

        <!-- Info Grid -->
        <section class="container">
            <div class="af-info-grid" id="infoGrid"></div>
        </section>

        <!-- Photos -->
        <section class="container af-photos" id="photosSection" style="display:none;">
            <h4 class="af-section-title"><i class="fa-solid fa-images"></i> Photos</h4>
            <div class="af-photos-grid" id="photosGrid"></div>
        </section>

        <!-- Map -->
        <section class="container af-map-container">
            <h4 class="af-section-title"><i class="fa-solid fa-map-location-dot"></i> Location</h4>
            <div class="af-map" id="map"></div>
        </section>

        <!-- Reviews -->
        <section class="container af-reviews" id="reviewsSection" style="display:none;">
            <h4 class="af-section-title"><i class="fa-solid fa-comments"></i> Reviews</h4>
            <div id="reviewsContainer"></div>
        </section>

    </div>

    <!-- ═══════ Error ═══════ -->
    <div class="af-empty" id="errorState" style="display:none;">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <h4 id="errorTitle">Something went wrong</h4>
        <p id="errorMessage"></p>
    </div>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Google Maps JS — key placeholder (leave empty or add yours) -->
    <script>
        // Placeholder: Replace YOUR_GOOGLE_MAPS_API_KEY with your key
        const GOOGLE_MAPS_KEY = "";  // e.g. "AIzaSy..."
    </script>

    <script>
    /* ─────────────────────────────────────
       Config
    ───────────────────────────────────── */
    const API_BASE = "http://localhost:8000";

    /* ─────────────────────────────────────
       Read URL params
    ───────────────────────────────────── */
    const params  = new URLSearchParams(window.location.search);
    const placeId = params.get("place_id");
    const placeName = params.get("name");

    // Show name immediately from URL param
    if (placeName) {
        document.getElementById("academyName").textContent = decodeURIComponent(placeName);
        document.title = `${decodeURIComponent(placeName)} — EliteForge`;
    }

    /* ─────────────────────────────────────
       Stars helper
    ───────────────────────────────────── */
    function renderStars(rating) {
        const full  = Math.floor(rating);
        const half  = rating % 1 >= 0.5 ? 1 : 0;
        const empty = 5 - full - half;
        let html = "";
        for (let i = 0; i < full;  i++) html += '<i class="fa-solid fa-star" style="color:#f59e0b"></i>';
        for (let i = 0; i < half;  i++) html += '<i class="fa-solid fa-star-half-stroke" style="color:#f59e0b"></i>';
        for (let i = 0; i < empty; i++) html += '<i class="fa-regular fa-star" style="color:#f59e0b"></i>';
        return html;
    }

    /* ─────────────────────────────────────
       Fetch & Render
    ───────────────────────────────────── */
    async function loadDetails() {
        if (!placeId) {
            showError("No academy selected", "Please go back to the Academy Finder and select an academy.");
            return;
        }

        try {
            const resp = await fetch(`${API_BASE}/api/academy-details?place_id=${encodeURIComponent(placeId)}`);

            if (!resp.ok) {
                const errData = await resp.json().catch(() => ({}));
                throw new Error(errData.detail || `Server error (${resp.status})`);
            }

            const data = await resp.json();
            renderDetails(data);

        } catch (err) {
            showError("Could not load academy details", err.message);
        }
    }

    function showError(title, message) {
        document.getElementById("loadingSpinner").style.display = "none";
        document.getElementById("errorState").style.display = "block";
        document.getElementById("errorTitle").textContent = title;
        document.getElementById("errorMessage").textContent = message;
    }

    function renderDetails(data) {
        document.getElementById("loadingSpinner").style.display = "none";
        document.getElementById("detailContent").style.display = "block";

        // ── Name ──
        document.getElementById("academyName").textContent = data.name;
        document.title = `${data.name} — EliteForge`;

        // ── Meta badges ──
        const meta = document.getElementById("detailMeta");
        let metaHTML = "";

        if (data.rating) {
            metaHTML += `<span>${renderStars(data.rating)} <strong>${data.rating}</strong> (${data.user_ratings_total || 0} reviews)</span>`;
        }
        if (data.is_open === true) {
            metaHTML += `<span class="open-badge"><i class="fa-solid fa-clock me-1"></i>Open Now</span>`;
        } else if (data.is_open === false) {
            metaHTML += `<span class="closed-badge"><i class="fa-solid fa-clock me-1"></i>Closed</span>`;
        }
        meta.innerHTML = metaHTML;

        // ── Info Grid ──
        const infoGrid = document.getElementById("infoGrid");
        let gridHTML = "";

        // Address
        if (data.address) {
            gridHTML += `
            <div class="af-info-card">
                <h5><i class="fa-solid fa-location-dot"></i> Address</h5>
                <p>${data.address}</p>
                ${data.maps_url ? `<a href="${data.maps_url}" target="_blank" class="d-block mt-2"><i class="fa-solid fa-diamond-turn-right me-1"></i>Get Directions</a>` : ""}
            </div>`;
        }

        // Phone
        if (data.phone) {
            gridHTML += `
            <div class="af-info-card">
                <h5><i class="fa-solid fa-phone"></i> Phone</h5>
                <p><a href="tel:${data.phone}">${data.phone}</a></p>
            </div>`;
        }

        // Website
        if (data.website) {
            gridHTML += `
            <div class="af-info-card">
                <h5><i class="fa-solid fa-globe"></i> Website</h5>
                <p><a href="${data.website}" target="_blank">${data.website}</a></p>
            </div>`;
        }

        // Opening Hours
        if (data.opening_hours && data.opening_hours.length > 0) {
            let hoursHTML = data.opening_hours.map(h => `<li>${h}</li>`).join("");
            gridHTML += `
            <div class="af-info-card">
                <h5><i class="fa-regular fa-clock"></i> Opening Hours</h5>
                <ul class="af-hours-list">${hoursHTML}</ul>
            </div>`;
        }

        infoGrid.innerHTML = gridHTML;

        // ── Photos ──
        if (data.photos && data.photos.length > 0) {
            const photosSection = document.getElementById("photosSection");
            const photosGrid = document.getElementById("photosGrid");
            photosSection.style.display = "block";
            photosGrid.innerHTML = data.photos
                .filter(url => url)
                .map(url => `<img src="${url}" alt="Academy photo" loading="lazy">`)
                .join("");
        }

        // ── Map ──
        renderMap(data.location.lat, data.location.lng, data.name);

        // ── Reviews ──
        if (data.reviews && data.reviews.length > 0) {
            const reviewsSection = document.getElementById("reviewsSection");
            const reviewsContainer = document.getElementById("reviewsContainer");
            reviewsSection.style.display = "block";
            reviewsContainer.innerHTML = data.reviews.map(r => `
                <div class="af-review-card">
                    <div class="af-review-header">
                        <span class="af-review-author">
                            <i class="fa-solid fa-user-circle me-1" style="color:var(--af-primary-light)"></i>
                            ${r.author}
                        </span>
                        <span class="af-review-time">${r.time}</span>
                    </div>
                    <div class="mb-2">${renderStars(r.rating)}</div>
                    <p class="af-review-text">${r.text}</p>
                </div>
            `).join("");
        }
    }

    /* ─────────────────────────────────────
       Map Rendering
    ───────────────────────────────────── */
    function renderMap(lat, lng, name) {
        const mapDiv = document.getElementById("map");

        if (GOOGLE_MAPS_KEY) {
            // Use Google Maps embed
            mapDiv.innerHTML = `
                <iframe
                    width="100%" height="100%" frameborder="0" style="border:0;border-radius:16px;"
                    referrerpolicy="no-referrer-when-downgrade"
                    src="https://www.google.com/maps/embed/v1/place?key=${GOOGLE_MAPS_KEY}&q=${lat},${lng}&zoom=15"
                    allowfullscreen>
                </iframe>`;
        } else {
            // Fallback: OpenStreetMap embed (no API key needed)
            mapDiv.innerHTML = `
                <iframe
                    width="100%" height="100%" frameborder="0" style="border:0;border-radius:16px;"
                    src="https://www.openstreetmap.org/export/embed.html?bbox=${lng-0.01},${lat-0.01},${lng+0.01},${lat+0.01}&layer=mapnik&marker=${lat},${lng}"
                    allowfullscreen>
                </iframe>`;
        }
    }

    /* ─────────────────────────────────────
       Init
    ───────────────────────────────────── */
    loadDetails();
    </script>

</body>
</html>
