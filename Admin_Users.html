<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Users</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    background: #f5f7fb;
}

.sidebar h4 {
    margin-bottom: 30px;
}

/* SAME SIDEBAR AS ADMIN */
.sidebar {
    height: 100vh;
    background: #1e3a8a;
    color: white;
    padding: 20px;
}

.sidebar a {
    display: block;
    padding: 10px;
    margin: 5px 0;
    color: white;
    text-decoration: none;
    border-radius: 8px;
}

.sidebar a:hover,
.sidebar .active {
    background: #e9f0ff;
    color: #0d6efd;
}

/* USER CARD */
.user-card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- ✅ SAME SIDEBAR -->
<div class="col-md-2 sidebar">
    <h4>Admin Dashboard</h4>
    <a href="Admin.html"><i class="fa fa-home me-2"></i>Dashboard</a>
    <a href="Admin_Users.html" class="active"><i class="fa fa-users me-2"></i>Users</a>
    <a href="Admin_Competitions.html"><i class="fa fa-trophy me-2"></i>Competitions</a>
    <a href="Admin_Academies.html"><i class="fa fa-graduation-cap me-2"></i>Academies</a>
    <a href="Admin_Feedback.html"><i class="fa fa-comment me-2"></i>Feedback</a>
    <a href="landing_page.html"><i class="fa-solid fa-right-from-bracket me-2"></i>Logout</a>
</div>

<!-- MAIN -->
<div class="col-md-10 p-4">

<h3>User Management</h3>

<!-- ✅ SEARCH BAR -->
<input type="text" id="searchInput" class="form-control mb-3" placeholder="Search users by name...">

<div id="userList"></div>

</div>
</div>
</div>

<script>

// LOAD USERS
async function loadUsers() {
    const res = await fetch("/api/users");
    const users = await res.json();

    window.allUsers = users;
    displayUsers(users);
}

// DISPLAY USERS
function displayUsers(users) {

    const container = document.getElementById("userList");
    container.innerHTML = "";

    users.forEach(user => {

        let div = document.createElement("div");
        div.className = "user-card";

        div.innerHTML = `
        <div class="d-flex justify-content-between align-items-center">

            <!-- LEFT -->
            <div class="d-flex gap-3">

                <img src="${user.profilePic || 'https://img.freepik.com/premium-vector/avatar-profile-icon-flat-style-user-profile-vector-illustration-isolated-background_157943-38866.jpg'}"
                     style="width:60px;height:60px;border-radius:50%;object-fit:cover;">

                <div>
                    <strong>${user.name}</strong>
                    <div>Email: ${user.email || ""}</div>
                    <div>Phone: ${user.phone || ""}</div>
                    <div>Location: ${user.location || ""}</div>
                    <div>Skills: ${(user.skills || []).join(", ")}</div>

                    ${user.banned ? "<div style='color:red'><b>BANNED</b></div>" : ""}
                </div>
            </div>

            <!-- RIGHT BUTTONS -->
            <div class="d-flex flex-column gap-2">

                ${!user.banned ? `
    <button onclick="editUser('${user._id}')" class="btn btn-sm btn-primary">Edit</button>
` : `
    <button class="btn btn-sm btn-secondary" disabled>Edit Disabled</button>
`}

${user.banned ? `
    <button onclick="unbanUser('${user._id}')" class="btn btn-sm btn-success">Unban</button>
` : `
    <button onclick="banUser('${user._id}')" class="btn btn-sm btn-warning">Ban</button>
`}
                <button onclick="deleteUser('${user._id}')" class="btn btn-sm btn-danger">Delete</button>

            </div>

        </div>
        `;

        container.appendChild(div);
    });
}

// SEARCH
document.getElementById("searchInput").addEventListener("input", function () {
    const value = this.value.toLowerCase();

    const filtered = window.allUsers.filter(u =>
        u.name.toLowerCase().includes(value)
    );

    displayUsers(filtered);
});

// DELETE
async function deleteUser(id) {
    if (!confirm("Delete user?")) return;

    await fetch(`/api/users/${id}`, { method: "DELETE" });
    loadUsers();
}

// BAN
async function banUser(id) {
    await fetch(`/api/users/ban/${id}`, { method: "PUT" });
    loadUsers();
}

// EDIT
async function editUser(id) {

    const name = prompt("Enter new name:");
    const email = prompt("Enter email:");
    const phone = prompt("Enter phone:");
    const location = prompt("Enter location:");
    const bio = prompt("Enter bio:");

    await fetch(`/api/users/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, phone, location, bio })
    });

    loadUsers();
}
async function unbanUser(id) {
    await fetch(`/api/users/unban/${id}`, { method: "PUT" });
    loadUsers();
}

// INIT
loadUsers();

</script>

</body>
</html>
