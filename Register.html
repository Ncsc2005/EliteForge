<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — EliteForge</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0a0e27;
  position: relative;
  overflow-x: hidden; /* only hide horizontal scroll */
}

/* ═══ Animated Gradient Background ═══ */
.bg-gradient-animated {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(-45deg, #0a0e27, #1a1a4e, #0d2137, #162447, #1f4068, #0a0e27);
  background-size: 400% 400%;
  animation: gradientShift 15s ease infinite;
  z-index: 0;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ═══ Floating Particles ═══ */
.particles {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 1;
  overflow: hidden;
  pointer-events: none;
}

.particle {
  position: absolute;
  border-radius: 50%;
  animation: floatParticle linear infinite;
  opacity: 0;
}

@keyframes floatParticle {
  0% { opacity: 0; transform: translateY(100vh) scale(0); }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { opacity: 0; transform: translateY(-10vh) scale(1); }
}

/* ═══ Floating Rings ═══ */
.ring {
  position: fixed;
  border: 2px solid rgba(250, 204, 21, 0.08);
  border-radius: 50%;
  animation: ringPulse 8s ease-in-out infinite;
}

.ring:nth-child(1) { width: 300px; height: 300px; top: -80px; right: -80px; animation-delay: 0s; }
.ring:nth-child(2) { width: 200px; height: 200px; bottom: -50px; left: -50px; animation-delay: 2s; }
.ring:nth-child(3) { width: 400px; height: 400px; top: 50%; left: -120px; animation-delay: 4s; border-color: rgba(99, 102, 241, 0.06); }

@keyframes ringPulse {
  0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.3; }
  50% { transform: scale(1.15) rotate(180deg); opacity: 0.6; }
}

/* ═══ Glowing Orbs ═══ */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(60px);
  z-index: 1;
  pointer-events: none;
}

.orb-1 {
  width: 300px; height: 300px;
  background: rgba(99, 102, 241, 0.15);
  top: -50px; right: 10%;
  animation: orbFloat1 10s ease-in-out infinite;
}

.orb-2 {
  width: 250px; height: 250px;
  background: rgba(250, 204, 21, 0.08);
  bottom: -30px; left: 5%;
  animation: orbFloat2 12s ease-in-out infinite;
}

.orb-3 {
  width: 200px; height: 200px;
  background: rgba(37, 99, 235, 0.12);
  top: 40%; right: -60px;
  animation: orbFloat1 14s ease-in-out infinite reverse;
}

@keyframes orbFloat1 {
  0%, 100% { transform: translate(0, 0); }
  33% { transform: translate(30px, -40px); }
  66% { transform: translate(-20px, 20px); }
}

@keyframes orbFloat2 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(40px, -30px); }
}

/* ═══ Register Card — Centered ═══ */
.register-wrapper {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 480px;
  padding: 40px 20px; /* added vertical padding for scrolling */
  margin: auto;
}

.register-card {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 44px 40px;
  box-shadow: 0 25px 80px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
  animation: cardEntry 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  position: relative;
  overflow: hidden;
}

.register-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, #facc15, #2563eb, #7c3aed, #facc15);
  background-size: 300% 100%;
  animation: shimmerBar 3s linear infinite;
}

@keyframes shimmerBar {
  0% { background-position: 0% 0; }
  100% { background-position: 300% 0; }
}

@keyframes cardEntry {
  from { opacity: 0; transform: translateY(30px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* Logo area */
.logo-area {
  text-align: center;
  margin-bottom: 28px;
}

.logo-area img {
  width: 56px; height: 56px;
  border-radius: 50%;
  box-shadow: 0 6px 24px rgba(250, 204, 21, 0.3);
  border: 3px solid rgba(250, 204, 21, 0.4);
  transition: transform 0.4s ease;
  margin-bottom: 14px;
}
.logo-area img:hover { transform: scale(1.1) rotate(10deg); }

.logo-area h2 {
  font-size: 1.5rem;
  font-weight: 800;
  color: #0a1229;
  margin-bottom: 4px;
}
.logo-area h2 span { color: #facc15; background: linear-gradient(135deg, #f59e0b, #facc15); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

.logo-area .subtitle {
  color: #94a3b8;
  font-size: 0.88rem;
}

/* Form */
.form-group {
  margin-bottom: 18px;
}

.form-group label {
  display: block;
  font-size: 0.78rem;
  font-weight: 600;
  color: #334155;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.input-wrapper {
  position: relative;
}

.input-wrapper i.field-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: #94a3b8;
  font-size: 1rem;
  transition: color 0.3s;
}

.input-wrapper input {
  width: 100%;
  padding: 13px 14px 13px 42px;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  font-size: 0.95rem;
  font-family: 'Inter', sans-serif;
  color: #1e293b;
  background: #f8fafc;
  transition: all 0.3s ease;
  outline: none;
}

.input-wrapper input:focus {
  border-color: #2563eb;
  background: white;
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
}

.input-wrapper input:focus ~ i.field-icon { color: #2563eb; }

.eye-toggle {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #94a3b8;
  font-size: 1.1rem;
  display: none;
  transition: color 0.2s;
  z-index: 2;
}
.eye-toggle:hover { color: #2563eb; }

/* Password Rules */
.password-rules {
  margin-top: 10px;
  padding: 12px 16px;
  background: #f8fafc;
  border-radius: 10px;
  border: 1px solid #e2e8f0;
}

.rule {
  font-size: 0.76rem;
  padding: 3px 0;
  display: flex;
  align-items: center;
  gap: 8px;
  color: #94a3b8;
  transition: all 0.3s;
}

.rule i { font-size: 0.7rem; width: 14px; text-align: center; }
.rule.valid { color: #16a34a; }
.rule.valid i { animation: checkBounce 0.4s ease; }
.rule.invalid { color: #ef4444; }

@keyframes checkBounce {
  0% { transform: scale(0); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

/* Strength Meter */
.strength-meter {
  height: 4px;
  background: #e2e8f0;
  border-radius: 4px;
  margin-top: 10px;
  overflow: hidden;
}

.strength-meter .meter-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.4s ease, background 0.4s ease;
  width: 0%;
}

.strength-label {
  font-size: 0.7rem;
  font-weight: 600;
  text-align: right;
  margin-top: 4px;
}

/* Button */
.register-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #0a1229, #1e3a8a);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 700;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 8px;
  position: relative;
  overflow: hidden;
}

.register-btn::after {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
  animation: btnShine 3s ease-in-out infinite;
}

@keyframes btnShine {
  0% { transform: translateX(-100%) rotate(45deg); }
  100% { transform: translateX(100%) rotate(45deg); }
}

.register-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(37, 99, 235, 0.4);
}

.register-btn:active { transform: translateY(0); }

.register-btn .spinner {
  display: none;
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

#msg {
  text-align: center;
  font-weight: 600;
  margin-top: 14px;
  font-size: 0.85rem;
  min-height: 20px;
}

.divider {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 20px 0;
  color: #cbd5e1;
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #e2e8f0;
}

.login-link {
  text-align: center;
  font-size: 0.88rem;
  color: #64748b;
}
.login-link a {
  color: #2563eb;
  text-decoration: none;
  font-weight: 700;
  transition: color 0.2s;
}
.login-link a:hover { color: #1e40af; text-decoration: underline; }

/* Features row */
.features-row {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-top: 20px;
  flex-wrap: wrap;
}

.feature-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.72rem;
  color: #64748b;
  background: #f1f5f9;
  padding: 6px 12px;
  border-radius: 20px;
  transition: all 0.3s;
}
.feature-badge:hover { background: #e0e7ff; color: #3730a3; transform: translateY(-2px); }
.feature-badge i { color: #2563eb; font-size: 0.8rem; }

/* Responsive */
@media (max-width: 520px) {
  .register-card { padding: 32px 24px; }
  .features-row { gap: 8px; }
}
</style>
</head>

<body>

<!-- Background layers -->
<div class="bg-gradient-animated"></div>

<div class="particles" id="particles"></div>

<div class="ring"></div>
<div class="ring"></div>
<div class="ring"></div>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- ═══ Centered Register Card ═══ -->
<div class="register-wrapper">
  <div class="register-card">

    <div class="logo-area">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTNHg88XvMz7N2DCZPR0u_U_sBAce28iWopCA&s" alt="EliteForge">
      <h2>Join Elite<span>Forge</span></h2>
      <p class="subtitle">Create your account and start exploring</p>
    </div>

    <div class="form-group">
      <label for="name">Username</label>
      <div class="input-wrapper">
        <input id="name" type="text" placeholder="Choose a unique username" required autocomplete="off">
        <i class="bi bi-person field-icon"></i>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrapper">
        <input type="password" id="password" placeholder="Create a strong password" autocomplete="new-password" required oninput="toggleEye(); checkPassword();">
        <i class="bi bi-lock field-icon"></i>
        <i class="bi bi-eye eye-toggle" id="eyeIcon" onclick="togglePassword()"></i>
      </div>

      <div class="password-rules" id="passwordRules" style="display:none;">
        <div class="rule" id="r1"><i class="bi bi-circle"></i> At least 8 characters</div>
        <div class="rule" id="r2"><i class="bi bi-circle"></i> One uppercase letter</div>
        <div class="rule" id="r3"><i class="bi bi-circle"></i> One lowercase letter</div>
        <div class="rule" id="r4"><i class="bi bi-circle"></i> One number</div>
        <div class="rule" id="r5"><i class="bi bi-circle"></i> One special character (@#$%^&*)</div>
        <div class="strength-meter"><div class="meter-fill" id="meterFill"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>
    </div>

    <button class="register-btn" onclick="registerUser()" id="registerBtn">
      <span class="spinner" id="spinner"></span>
      <span id="btnText">Create Account</span>
      <i class="bi bi-arrow-right" id="btnArrow"></i>
    </button>

    <p id="msg"></p>

    <div class="divider">or</div>

    <p class="login-link">Already have an account? <a href="login.html">Sign In</a></p>

    <div class="features-row">
      <span class="feature-badge"><i class="bi bi-shield-check"></i> Secure</span>
      <span class="feature-badge"><i class="bi bi-lightning"></i> Fast</span>
      <span class="feature-badge"><i class="bi bi-star"></i> Free</span>
    </div>

  </div>
</div>

<script>
/* ═══ Generate Floating Particles ═══ */
(function(){
  const container = document.getElementById('particles');
  const colors = ['rgba(250,204,21,0.4)', 'rgba(99,102,241,0.4)', 'rgba(37,99,235,0.3)', 'rgba(255,255,255,0.2)'];

  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 6 + 2;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDuration = (Math.random() * 10 + 8) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    container.appendChild(p);
  }
})();

/* ═══ Form Logic ═══ */
const passwordInput = document.getElementById("password");

function toggleEye() {
  const eye = document.getElementById("eyeIcon");
  eye.style.display = passwordInput.value.length > 0 ? "block" : "none";
  document.getElementById("passwordRules").style.display = passwordInput.value.length > 0 ? "block" : "none";
}

function togglePassword() {
  const eye = document.getElementById("eyeIcon");
  if (passwordInput.type === "password") {
    passwordInput.type = "text";
    eye.classList.remove("bi-eye");
    eye.classList.add("bi-eye-slash");
  } else {
    passwordInput.type = "password";
    eye.classList.remove("bi-eye-slash");
    eye.classList.add("bi-eye");
  }
}

function checkPassword() {
  const p = passwordInput.value;
  const rules = [
    { el: "r1", test: p.length >= 8 },
    { el: "r2", test: /[A-Z]/.test(p) },
    { el: "r3", test: /[a-z]/.test(p) },
    { el: "r4", test: /[0-9]/.test(p) },
    { el: "r5", test: /[@#$%^&*]/.test(p) }
  ];
  let passed = 0;
  rules.forEach(r => {
    const el = document.getElementById(r.el);
    const icon = el.querySelector("i");
    if (r.test) {
      passed++;
      el.className = "rule valid";
      icon.className = "bi bi-check-circle-fill";
    } else {
      el.className = "rule invalid";
      icon.className = "bi bi-x-circle";
    }
  });
  const meter = document.getElementById("meterFill");
  const label = document.getElementById("strengthLabel");
  const pct = (passed / 5) * 100;
  meter.style.width = pct + "%";
  if (passed <= 1) { meter.style.background = "#ef4444"; label.textContent = "Weak"; label.style.color = "#ef4444"; }
  else if (passed <= 3) { meter.style.background = "#f59e0b"; label.textContent = "Medium"; label.style.color = "#f59e0b"; }
  else if (passed <= 4) { meter.style.background = "#3b82f6"; label.textContent = "Strong"; label.style.color = "#3b82f6"; }
  else { meter.style.background = "#16a34a"; label.textContent = "Excellent"; label.style.color = "#16a34a"; }
  if (p.length === 0) { label.textContent = ""; meter.style.width = "0%"; }
}

async function registerUser() {
  const name = document.getElementById("name").value.trim();
  const password = passwordInput.value;
  const msg = document.getElementById("msg");
  const btn = document.getElementById("registerBtn");
  const spinner = document.getElementById("spinner");
  const btnText = document.getElementById("btnText");
  const btnArrow = document.getElementById("btnArrow");

  if (!name) { msg.innerHTML = "Please enter a username"; msg.style.color = "#ef4444"; return; }

  const ok = password.length >= 8 && /[A-Z]/.test(password) && /[a-z]/.test(password) && /[0-9]/.test(password) && /[@#$%^&*]/.test(password);
  if (!ok) { msg.innerHTML = "Please satisfy all password requirements"; msg.style.color = "#ef4444"; return; }

  spinner.style.display = "block"; btnText.textContent = "Creating account..."; btnArrow.style.display = "none"; btn.disabled = true;

  try {
    let response = await fetch("http://localhost:3000/register", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ name, password })
    });
    let data = await response.json();
    if (!response.ok) { msg.innerHTML = data.msg || "Registration failed"; msg.style.color = "#ef4444"; resetBtn(); return; }
    msg.innerHTML = "✓ " + data.msg; msg.style.color = "#16a34a";
    setTimeout(() => window.location.href = 'login.html', 900);
  } catch (err) {
    msg.innerHTML = "Server not reachable. Please try again."; msg.style.color = "#ef4444"; resetBtn();
  }
}

function resetBtn() {
  document.getElementById("spinner").style.display = "none";
  document.getElementById("btnText").textContent = "Create Account";
  document.getElementById("btnArrow").style.display = "inline";
  document.getElementById("registerBtn").disabled = false;
}

document.addEventListener("keydown", (e) => { if (e.key === "Enter") registerUser(); });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
